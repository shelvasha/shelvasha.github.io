<header class="site-header">

  <div class="wrapper">
  <nav class="site-nav">
    <div class="trigger">
        <!-- {{ site.title }} instead of blog -->
        <a style="text-align: left; font-weight:bold; font-size: 1.25em" class="page-link" href="{{ site.baseurl }}/">Shel</a>
        {% for page in site.pages %}
          {% if page.title %}
          <a class="page-link" href="{{ page.url | prepend: site.baseurl }}">{{ page.title }}</a>
          {% endif %}
        {% endfor %}

    </div>
  </nav>
  </div>
</header>
